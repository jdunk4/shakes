        "https://turbo-gateway.com/ux_lHtfXEO6uDMfScGGleIsQhwRbDtTxeGEuOm1lZa4",

        "https://turbo-gateway.com/lJf7g87F1umh0FvLKSYEZrraJQaR50rlZbIuUQE161k",
        "https://turbo-gateway.com/38uqC6K4jms6IAkxtR6odSYkQE5ME6Nl13mhDjy067o",
        "https://turbo-gateway.com/tJgBZ98xL0CXAMV8D_xUoAaxcBNJdXkAF8IUQck6XX0",
        "https://turbo-gateway.com/B0HBmNhHN1jSrwIfm3w71_2JRhkVoifNkxddCsQDFk8",
        "https://turbo-gateway.com/_xrLNb86reESMee0YDJSg6Yu47MMRv4cTjal6Bt1d7c",
        "https://turbo-gateway.com/JPRcOrdx20uUHRvgjhrmuTDEX63_Xl6q784jrcc2eEk"
      ];

      const ACTS = [{
          t: "ACT I",
          s: 0,
          n: 20
        },
        {
          t: "ACT II",
          s: 20,
          n: 20
        },
        {
          t: "ACT III",
          s: 40,
          n: 23
        },
        {
          t: "ACT IV",
          s: 63,
          n: 12
        },
        {
          t: "ACT V",
          s: 75,
          n: 13
        }
      ];

      const FALLBACK_GATEWAYS = [
        "https://arweave.net", "https://turbo-gateway.com", "https://permagate.io",
        "https://ar-io.dev", "https://g8way.io", "https://gateway.irys.xyz"
      ];
      let activeGateways = [...FALLBACK_GATEWAYS];

      async function fetchGatewayList() {
        try {
          const r = await fetch("https://ar-io.dev/ar-io/peers", {
            signal: AbortSignal.timeout(5000)
          });
          const peers = await r.json();
          activeGateways = [...FALLBACK_GATEWAYS, ...peers.map(p => "https://" + p)];
        } catch {}
      }

      const TX_IDS = PAGES.map(u => u.split("/").pop());
      let curAct = 0,
        curPage = 0,
        isAnim = false;
      const bookClosed = document.getElementById("book-closed");
      const bookUI = document.getElementById("book-ui");
      const status = document.getElementById("status");
      const img = document.getElementById("page-img");
      const hinge = document.getElementById("page-hinge");
      const bendLeft = document.getElementById("bend-left");
      const bendRight = document.getElementById("bend-right");
      const cache = {},
        inflight = {};

      function fetchPage(idx) {
        if (cache[idx] || inflight[idx] || idx >= PAGES.length) return;
        inflight[idx] = true;
        const tx = TX_IDS[idx];
        let done = false;
        activeGateways.forEach(gw => {
          const url = gw + "/" + tx;
          const i = new Image();
          i.onload = () => {
            if (!done) {
              done = true;
              cache[idx] = url;
            }
          };
          i.src = url;
        });
      }

      function prefetchAhead() {
        const base = ACTS[curAct].s + curPage;
        for (let d = 1; d <= 4; d++) fetchPage(base + d);
      }

      function setStatus(m) {
        status.setAttribute("content", m);
      }

      const ACT_COLORS = ["#f0a832", "#e8824a", "#c94d5a", "#9b2335", "#7a1535"];

      function updateTabs() {
        for (let i = 0; i < 5; i++) {
          const bg = document.getElementById("tab-bg-" + i);
          const lb = document.getElementById("tab-" + i);
          if (!bg || !lb) continue;
          const on = i === curAct;
          const h = on ? "0.18" : "0.14",
            y = on ? "0.76" : "0.74";
          bg.setAttribute("color", ACT_COLORS[i]);
          bg.setAttribute("height", h);
          bg.setAttribute("y", y);
          lb.setAttribute("color", ACT_COLORS[i]);
          lb.setAttribute("height", h);
          lb.setAttribute("y", y);
        }
      }

      function render() {
        const a = ACTS[curAct],
          idx = a.s + curPage;
        const url = cache[idx] || PAGES[idx];
        img.setAttribute("src", url);
        if (!cache[idx]) fetchPage(idx);
        updateTabs();
        setStatus(a.t + " - " + (curPage + 1) + " of " + a.n);
        setTimeout(() => setStatus(""), 4000);
        prefetchAhead();
      }

      const STEPS = 60,
        MS = 16;

      function curl(dir, onMid, onDone) {
        isAnim = true;
        let s = 0;

        hinge.setAttribute("visible", "true");
        hinge.setAttribute("ry", dir === 1 ? "0" : "-175");
        hinge.setAttribute("z", "0.01");
        bendLeft.setAttribute("ry", "0");
        bendRight.setAttribute("ry", "0");

        function tick() {
          s++;
          const t = s / STEPS;
          const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

          // Master hinge — whole page rotates from spine at x=0
          const hingeRy = dir === 1 ? e * -175 : -175 + e * 175;
          hinge.setAttribute("ry", String(hingeRy.toFixed(1)));

          // Z-lift — page rises toward camera at mid-turn
          const zLift = Math.sin(t * Math.PI) * 0.14;
          hinge.setAttribute("z", String((0.01 + zLift).toFixed(3)));

          // Bend — leading half folds back at mid-turn creating a crease at x=0
          // Both halves are anchored at x=0 so they can never separate
          const bendPeak = Math.sin(t * Math.PI);
          if (dir === 1) {
            bendRight.setAttribute("ry", String((-bendPeak * 40).toFixed(1)));
            bendLeft.setAttribute("ry", "0");
          } else {
            bendLeft.setAttribute("ry", String((bendPeak * 40).toFixed(1)));
            bendRight.setAttribute("ry", "0");
          }

          if (s === Math.floor(STEPS / 2)) onMid();

          if (s < STEPS) {
            setTimeout(tick, MS);
          } else {
            hinge.setAttribute("visible", "false");
            hinge.setAttribute("ry", "0");
            hinge.setAttribute("z", "0.01");
            bendLeft.setAttribute("ry", "0");
            bendRight.setAttribute("ry", "0");
            img.setAttribute("ry", "0");
            isAnim = false;
            onDone();
          }
        }
        tick();
      }

      function jumpToAct(i) {
        if (i >= ACTS.length || isAnim) return;
        curAct = i;
        curPage = 0;
        render();
      }

      function nextPage() {
        if (isAnim) return;
        const a = ACTS[curAct];
        let na = curAct,
          np = curPage;
        if (curPage < a.n - 1) {
          np++;
        } else if (curAct < ACTS.length - 1) {
          na++;
          np = 0;
        } else return;
        curl(1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function prevPage() {
        if (isAnim) return;
        let na = curAct,
          np = curPage;
        if (curPage > 0) {
          np--;
        } else if (curAct > 0) {
          na--;
          np = ACTS[na].n - 1;
        } else return;
        curl(-1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function openBook() {
        if (isAnim) return;
        isAnim = true;
        const SLIDE_STEPS = 20,
          SLIDE_MS = 16;
        const SWING_STEPS = 40,
          SWING_MS = 16;
        let step = 0;

        function slideOut() {
          step++;
          const t = step / SLIDE_STEPS;
          const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
          bookClosed.setAttribute("z", String((e * 0.5).toFixed(3)));
          if (step < SLIDE_STEPS) {
            setTimeout(slideOut, SLIDE_MS);
          } else {
            step = 0;
            setTimeout(swingOpen, 80);
          }
        }

        function swingOpen() {
          bookClosed.setAttribute("visible", "false");
          bookUI.setAttribute("visible", "true");
          fetchGatewayList().then(() => {
            for (let i = 0; i < PAGES.length; i++) fetchPage(i);
          });
          for (let i = 0; i < PAGES.length; i++) fetchPage(i);
          render();
          img.setAttribute("ry", "-170");

          function tick() {
            step++;
            const t = step / SWING_STEPS;
            const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
            img.setAttribute("ry", String((-170 + e * 170).toFixed(1)));
            if (step < SWING_STEPS) {
              setTimeout(tick, SWING_MS);
            } else {
              img.setAttribute("ry", "0");
              isAnim = false;
            }
          }
          tick();
        }
        slideOut();
      }

      function closeBook() {
        bookUI.setAttribute("visible", "false");
        bookClosed.setAttribute("visible", "true");
        bookClosed.setAttribute("z", "0");
      }

      window.openBook = openBook;
      window.closeBook = closeBook;
      window.nextPage = nextPage;
      window.prevPage = prevPage;
      window.jumpToAct = jumpToAct;
    })();
  </script>

</m-group>
</body>
</html>
