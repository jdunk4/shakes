        "https://turbo-gateway.com/YeSm6BTQ3exmOoXXQziaPY7xMeouHbfpMWmNuqrgGGI",
        "https://turbo-gateway.com/qcr0w7pjCtX7GW_bSY-acP5oUz5auvbkz3C1TmxzM_c",
        "https://turbo-gateway.com/FlRn8_frBjF0jDRGycOYlYpG7j60NDu2spqCPFUqN1w",
        "https://turbo-gateway.com/FCjDdc9Mrj8BWNEBDi_1xvydKnMa6qu2z09Ac9bOOaw",
        "https://turbo-gateway.com/45C_7fBtVDb1saURKsiSj4ygrO061s_i_T2aYSKrWVU",
        "https://turbo-gateway.com/CWUGgTej1aM7y4ulaTyzLOLoU31Y2xhJS6X6Wbv2Ml0",
        "https://turbo-gateway.com/riSOu-d5nPmTyKNa17nVNVIhBjkOmOMRz8AKq34qQHM",
        "https://turbo-gateway.com/AuYVVFRQ4W_ngtfhmcRZgDAuUDyHVst04QZ8B_uztMM",
        "https://turbo-gateway.com/5QJ0S0rbqsAiKTSHkVJSEWmas8ZGssiWU_joDr9sLXk",
        "https://turbo-gateway.com/c7SO2sRIJU-9KEwZ0wx6UQohh__dekuXeV2y1yhlHcU",
        "https://turbo-gateway.com/v-YWsA6PzvSYB_Tr6m4JKY9lyriOtv8UB6J0rizR_fk",
        "https://turbo-gateway.com/mJ3g6HV9MTs-EAbV_0i4LY9JoMpFYufDkRkCKOpMhL4",
        "https://turbo-gateway.com/M0_08b8X58xLaT5s0C9hnfoEvStMono_rOOI3GpUsXs",
        "https://turbo-gateway.com/5H2eVzBzJF6eZoVAJ4CCxO-hB054KgdPzI-OZ6ogdsE",
        "https://turbo-gateway.com/0k7N9Hvd1FjFJ4tK55eZt-hNg-QEHZY3tXpEtw6w0eM",
        "https://turbo-gateway.com/nFZqEAw2rZsu3gtY3x85822CQoDxMHa0ddn1Pd56k4g"
      ];

      const ACTS = [{
          t: "ACT I",
          s: 0,
          n: 10
        },
        {
          t: "ACT II",
          s: 10,
          n: 11
        },
        {
          t: "ACT III",
          s: 21,
          n: 18
        },
        {
          t: "ACT IV",
          s: 39,
          n: 8
        },
        {
          t: "ACT V",
          s: 47,
          n: 11
        }
      ];

      const FALLBACK_GATEWAYS = [
        "https://arweave.net", "https://turbo-gateway.com", "https://permagate.io",
        "https://ar-io.dev", "https://g8way.io", "https://gateway.irys.xyz"
      ];
      let activeGateways = [...FALLBACK_GATEWAYS];

      async function fetchGatewayList() {
        try {
          const r = await fetch("https://ar-io.dev/ar-io/peers", {
            signal: AbortSignal.timeout(5000)
          });
          const peers = await r.json();
          activeGateways = [...FALLBACK_GATEWAYS, ...peers.map(p => "https://" + p)];
        } catch {}
      }

      const TX_IDS = PAGES.map(u => u.split("/").pop());
      let curAct = 0,
        curPage = 0,
        isAnim = false;
      const bookClosed = document.getElementById("book-closed");
      const bookUI = document.getElementById("book-ui");
      const status = document.getElementById("status");
      const img = document.getElementById("page-img");
      const cache = {},
        inflight = {};

      function fetchPage(idx) {
        if (cache[idx] || inflight[idx] || idx >= PAGES.length) return;
        inflight[idx] = true;
        const tx = TX_IDS[idx];
        let done = false;
        activeGateways.forEach(gw => {
          const url = gw + "/" + tx;
          const i = new Image();
          i.onload = () => {
            if (!done) {
              done = true;
              cache[idx] = url;
            }
          };
          i.src = url;
        });
      }

      function prefetchAhead() {
        const base = ACTS[curAct].s + curPage;
        for (let d = 1; d <= 4; d++) fetchPage(base + d);
      }

      function setStatus(m) {
        status.setAttribute("content", m);
      }

      const ACT_COLORS = ["#f0a832", "#e8824a", "#c94d5a", "#9b2335", "#7a1535"];

      function updateTabs() {
        for (let i = 0; i < 5; i++) {
          const bg = document.getElementById("tab-bg-" + i);
          const lb = document.getElementById("tab-" + i);
          if (!bg || !lb) continue;
          const on = i === curAct;
          const h = on ? "0.18" : "0.14",
            y = on ? "0.76" : "0.74";
          bg.setAttribute("color", ACT_COLORS[i]);
          bg.setAttribute("height", h);
          bg.setAttribute("y", y);
          lb.setAttribute("color", ACT_COLORS[i]);
          lb.setAttribute("height", h);
          lb.setAttribute("y", y);
        }
      }

      function render() {
        const a = ACTS[curAct],
          idx = a.s + curPage;
        const url = cache[idx] || PAGES[idx];
        img.setAttribute("src", url);
        if (!cache[idx]) fetchPage(idx);
        updateTabs();
        setStatus(a.t + " - " + (curPage + 1) + " of " + a.n);
        setTimeout(() => setStatus(""), 4000);
        prefetchAhead();
      }

      const STEPS = 22,
        MS = 18;

      function curl(dir, onMid, onDone) {
        isAnim = true;
        let s = 0;

        function tick() {
          s++;
          const t = s / STEPS,
            e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
          img.setAttribute("ry", String((dir === 1 ? e * -170 : (1 - e) * -170).toFixed(1)));
          if (s === Math.floor(STEPS / 2)) onMid();
          if (s < STEPS) {
            setTimeout(tick, MS);
          } else {
            img.setAttribute("ry", "0");
            isAnim = false;
            onDone();
          }
        }
        tick();
      }

      function jumpToAct(i) {
        if (i >= ACTS.length || isAnim) return;
        curAct = i;
        curPage = 0;
        render();
      }

      function nextPage() {
        if (isAnim) return;
        const a = ACTS[curAct];
        let na = curAct,
          np = curPage;
        if (curPage < a.n - 1) {
          np++;
        } else if (curAct < ACTS.length - 1) {
          na++;
          np = 0;
        } else return;
        curl(1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function prevPage() {
        if (isAnim) return;
        let na = curAct,
          np = curPage;
        if (curPage > 0) {
          np--;
        } else if (curAct > 0) {
          na--;
          np = ACTS[na].n - 1;
        } else return;
        curl(-1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function openBook() {
        bookClosed.setAttribute("visible", "false");
        bookUI.setAttribute("visible", "true");
        fetchGatewayList().then(() => {
          for (let i = 0; i < PAGES.length; i++) fetchPage(i);
        });
        for (let i = 0; i < PAGES.length; i++) fetchPage(i);
        render();
      }

      function closeBook() {
        bookUI.setAttribute("visible", "false");
        bookClosed.setAttribute("visible", "true");
      }

      window.openBook = openBook;
      window.closeBook = closeBook;
      window.nextPage = nextPage;
      window.prevPage = prevPage;
      window.jumpToAct = jumpToAct;
    })();
  </script>
