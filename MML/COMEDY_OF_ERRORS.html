<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>COMEDY_OF_ERRORS</title></head>
<body>
<m-group id="book-root" y="1.2">

  <m-group id="book-closed" onclick="openBook()">

    <!-- BODY CUBE -->
    <m-cube color="#2a0e06" width="0.06" height="0.44" depth="0.32"></m-cube>

    <!-- Top / bottom / back faces -->
    <m-plane color="#3a1610" width="0.06" height="0.32" y=" 0.221" rx="-90"></m-plane>
    <m-plane color="#180904" width="0.06" height="0.32" y="-0.221" rx="90"></m-plane>

    <!-- SPINE -->
    <m-image id="spine-img" src="https://turbo-gateway.com/5WRyj_ZAMGwtX_L2XhRDQHqHdzSrUvCEnob1oTFBg_I" width="0.060" height="0.440" z="0.163" emissive="1.0">
    </m-image>

    <!-- Raised ribs -->
    <m-cube color="#3a0e06" width="0.066" height="0.010" depth="0.010" z="0.159" y=" 0.050"></m-cube>
    <m-plane color="#c8961e" width="0.062" height="0.003" z="0.169" y=" 0.050"></m-plane>
    <m-cube color="#3a0e06" width="0.066" height="0.010" depth="0.010" z="0.159" y="-0.048"></m-cube>

    <m-cube color="#3a0e06" width="0.066" height="0.010" depth="0.010" z="0.159" y="-0.138"></m-cube>

  </m-group>

  <m-group id="book-ui" visible="false">
    <m-cube width="0.04" height="1.30" depth="0.06" color="#3b1f0e"></m-cube>

    <m-plane id="tab-bg-0" width="0.34" height="0.14" color="#f0a832" x="-0.72" y="0.74" z="0.02"></m-plane>

    <m-plane id="tab-bg-2" width="0.34" height="0.14" color="#c94d5a" x="0.00" y="0.74" z="0.02"></m-plane>

    <m-label id="tab-4" content="ACT V" width="0.34" height="0.14" color="#7a1535" x="0.72" y="0.74" z="0.03" font-size="5" font-color="#ffffff" alignment="center" onclick="jumpToAct(4)"></m-label>

    <m-image id="page-img" width="1.88" height="1.24" x="0" y="-0.02" z="0" emissive="0.5" src=""></m-image>
    <m-label id="status" content="" width="1.6" height="0.10" x="0" y="-0.70" z="0.05" font-size="3.0" font-color="#f0a832" alignment="center"></m-label>

    <m-plane width="0.30" height="0.10" color="#f0a832" x="-0.65" y="-0.78" z="0.05"></m-plane>
    <m-label content="PREV" width="0.30" height="0.10" color="#f0a832" x="-0.65" y="-0.78" z="0.06" font-size="4" font-color="#ffffff" alignment="center" onclick="prevPage()"></m-label>
    <m-plane width="0.30" height="0.10" color="#c94d5a" x="0.65" y="-0.78" z="0.05"></m-plane>
    <m-label content="NEXT" width="0.30" height="0.10" color="#c94d5a" x="0.65" y="-0.78" z="0.06" font-size="4" font-color="#ffffff" alignment="center" onclick="nextPage()"></m-label>
    <m-plane width="0.28" height="0.10" color="#7a1535" x="0.0" y="-0.78" z="0.05"></m-plane>
    <m-label content="CLOSE" width="0.28" height="0.10" color="#7a1535" x="0.0" y="-0.78" z="0.06" font-size="4" font-color="#ffffff" alignment="center" onclick="closeBook()"></m-label>

        "https://turbo-gateway.com/CeL12EAR2y3Rv3VeD8WAwylkAre-6sW3ETAIZPb7DjA",

        "https://turbo-gateway.com/kDMbHb8mTVR_kAgY8XJcJfSZk_ZrqrRNVz3yE8gkW0A",
        "https://turbo-gateway.com/mNKfP-QGt8w8Fyk-3PzKDXSc8Js0tPh1mQ0RTaoOr_8",
        "https://turbo-gateway.com/zP1iD23BaFYhYTTJzgdrUzc-mrm3N1j0gwZwVldx8Lg",
        "https://turbo-gateway.com/kDZleVdHdLT0cjSqqe2CmDZgtJ0h1dv7v6NAav_TcUo",
        "https://turbo-gateway.com/w6SzX7X_WBPXedhss2R2eJtOBTJTabw15oQPXkhNfhg",
        "https://turbo-gateway.com/TFjAUYzjDBvFujX_A8fN8KyFH0pO6KGnmyL_fIEjyD8",
        "https://turbo-gateway.com/-HV0zY_nwYuP2IGLLT9PiyzRKzgZQIocbLZ0pWtTsbA",
        "https://turbo-gateway.com/cEJsSSbjAjxLlfIuKPq56UW6f3JM8baiEYM55Q4OZJQ",
        "https://turbo-gateway.com/VSgzeu5MfLp7EINsPliCkSciPlssIco7XJlu3BQP4lA",
        "https://turbo-gateway.com/Tt58FWU3dPum6RPzC48Bm8f2XqpE6TDeI6z9lTzfhlI",
        "https://turbo-gateway.com/mwr6IOHBGXlXDZLpYBDIo6YdFCOHz3WJARJ8aThvQY8",
        "https://turbo-gateway.com/RbHx-ksb_uY1G9NW3URGNQXJDniEpLSvj6Ia1OxdKGE",
        "https://turbo-gateway.com/HuS4jSJfGUVwi1Zjidnph1TXV0K-sGzSHmd-LlW3aQ8",
        "https://turbo-gateway.com/p-QQudnFMslydBhjPQi66fjFGDSb_XekAyPWCDuqymM",
        "https://turbo-gateway.com/jLM2DqJCiafSzJ64mGeXfFy1XO3VptKziH-mBm1RqyE",
        "https://turbo-gateway.com/gybNAVQtQS1hQDXgoGKm5Ilu7ta7oMXn1e5IeWIweC4",
        "https://turbo-gateway.com/viqwNZt144Z5dLu7u3oM2fc6hj1K9Utd91_mHervYow",
        "https://turbo-gateway.com/DInuFpFRUJhMLCQhQRDz4wjLkGY72UKgBNFFcboKBZY",
        "https://turbo-gateway.com/0RxuR0PkSefnvfqIDWXL9aYUaDkBuT8oaj3ujgE890Y"
      ];

      const ACTS = [{
          t: "ACT I",
          s: 0,
          n: 8
        },
        {
          t: "ACT II",
          s: 8,
          n: 10
        },
        {
          t: "ACT III",
          s: 18,
          n: 10
        },
        {
          t: "ACT IV",
          s: 28,
          n: 14
        },
        {
          t: "ACT V",
          s: 42,
          n: 13
        }
      ];

      const FALLBACK_GATEWAYS = [
        "https://arweave.net", "https://turbo-gateway.com", "https://permagate.io",
        "https://ar-io.dev", "https://g8way.io", "https://gateway.irys.xyz"
      ];
      let activeGateways = [...FALLBACK_GATEWAYS];

      async function fetchGatewayList() {
        try {
          const r = await fetch("https://ar-io.dev/ar-io/peers", {
            signal: AbortSignal.timeout(5000)
          });
          const peers = await r.json();
          activeGateways = [...FALLBACK_GATEWAYS, ...peers.map(p => "https://" + p)];
        } catch {}
      }

      const TX_IDS = PAGES.map(u => u.split("/").pop());
      let curAct = 0,
        curPage = 0,
        isAnim = false;
      const bookClosed = document.getElementById("book-closed");
      const bookUI = document.getElementById("book-ui");
      const status = document.getElementById("status");
      const img = document.getElementById("page-img");
      const cache = {},
        inflight = {};

      function fetchPage(idx) {
        if (cache[idx] || inflight[idx] || idx >= PAGES.length) return;
        inflight[idx] = true;
        const tx = TX_IDS[idx];
        let done = false;
        activeGateways.forEach(gw => {
          const url = gw + "/" + tx;
          const i = new Image();
          i.onload = () => {
            if (!done) {
              done = true;
              cache[idx] = url;
            }
          };
          i.src = url;
        });
      }

      function prefetchAhead() {
        const base = ACTS[curAct].s + curPage;
        for (let d = 1; d <= 4; d++) fetchPage(base + d);
      }

      function setStatus(m) {
        status.setAttribute("content", m);
      }

      const ACT_COLORS = ["#f0a832", "#e8824a", "#c94d5a", "#9b2335", "#7a1535"];

      function updateTabs() {
        for (let i = 0; i < 5; i++) {
          const bg = document.getElementById("tab-bg-" + i);
          const lb = document.getElementById("tab-" + i);
          if (!bg || !lb) continue;
          const on = i === curAct;
          const h = on ? "0.18" : "0.14",
            y = on ? "0.76" : "0.74";
          bg.setAttribute("color", ACT_COLORS[i]);
          bg.setAttribute("height", h);
          bg.setAttribute("y", y);
          lb.setAttribute("color", ACT_COLORS[i]);
          lb.setAttribute("height", h);
          lb.setAttribute("y", y);
        }
      }

      function render() {
        const a = ACTS[curAct],
          idx = a.s + curPage;
        const url = cache[idx] || PAGES[idx];
        img.setAttribute("src", url);
        if (!cache[idx]) fetchPage(idx);
        updateTabs();
        setStatus(a.t + " - " + (curPage + 1) + " of " + a.n);
        setTimeout(() => setStatus(""), 4000);
        prefetchAhead();
      }

      const STEPS = 22,
        MS = 18;

      function curl(dir, onMid, onDone) {
        isAnim = true;
        let s = 0;

        function tick() {
          s++;
          const t = s / STEPS,
            e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
          img.setAttribute("ry", String((dir === 1 ? e * -170 : (1 - e) * -170).toFixed(1)));
          if (s === Math.floor(STEPS / 2)) onMid();
          if (s < STEPS) {
            setTimeout(tick, MS);
          } else {
            img.setAttribute("ry", "0");
            isAnim = false;
            onDone();
          }
        }
        tick();
      }

      function jumpToAct(i) {
        if (i >= ACTS.length || isAnim) return;
        curAct = i;
        curPage = 0;
        render();
      }

      function nextPage() {
        if (isAnim) return;
        const a = ACTS[curAct];
        let na = curAct,
          np = curPage;
        if (curPage < a.n - 1) {
          np++;
        } else if (curAct < ACTS.length - 1) {
          na++;
          np = 0;
        } else return;
        curl(1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function prevPage() {
        if (isAnim) return;
        let na = curAct,
          np = curPage;
        if (curPage > 0) {
          np--;
        } else if (curAct > 0) {
          na--;
          np = ACTS[na].n - 1;
        } else return;
        curl(-1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function openBook() {
        bookClosed.setAttribute("visible", "false");
        bookUI.setAttribute("visible", "true");
        fetchGatewayList().then(() => {
          for (let i = 0; i < PAGES.length; i++) fetchPage(i);
        });
        for (let i = 0; i < PAGES.length; i++) fetchPage(i);
        render();
      }

      function closeBook() {
        bookUI.setAttribute("visible", "false");
        bookClosed.setAttribute("visible", "true");
      }

      window.openBook = openBook;
      window.closeBook = closeBook;
      window.nextPage = nextPage;
      window.prevPage = prevPage;
      window.jumpToAct = jumpToAct;
    })();
  </script>

</body>
</html>
