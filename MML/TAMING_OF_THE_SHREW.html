        "https://turbo-gateway.com/id50Uh1yRMKPQW05LIW-_npv9g062eff4_5a1-NLMlk",

        "https://turbo-gateway.com/yYSztKKDdpN45Nw0VkadWX9TMzyO7RwlZl4To74JF1w",
        "https://turbo-gateway.com/IFPUTzd3ZgMLm3RSkiC8LGCJ_nj2SpAV6qv8s7forPc",
        "https://turbo-gateway.com/tUnf2_rq2ljwbsHTh0CMhc3HWQe3L66v9hVKutK-zO0",
        "https://turbo-gateway.com/84DkMFn8vqSNPKTse4YhjHGmUcAJYjix9auvB4wIaYA",
        "https://turbo-gateway.com/Eone5VebSKSeyqQOFtlWROkSvbR0wGgEp1JcJZUu_tg",
        "https://turbo-gateway.com/_xQrbxCVTK6Tk8RRm9tBx5PtGTYigg0U1BZ4nA2PTx0",
        "https://turbo-gateway.com/ekmvwSGRQPN_eS5UFJBn0Xw1VMVZorAKlwzltC00yek",
        "https://turbo-gateway.com/JJSotZsO_AcjFo-GOXZue3mSnor2BBNgogaYUPmIvE4",
        "https://turbo-gateway.com/WHx9b4XX-17Bj8G1fXpGQLlH1pP6DCcw80Y57qmgIe4",
        "https://turbo-gateway.com/6iGjvax79iC6fKjIH6l2-UheHqAtn1XXbVyY_MPKrvk",
        "https://turbo-gateway.com/DtOIwXuS4BHaCjgsi9aIHjNaPcv4Hb-Qsil_Azc--XE",
        "https://turbo-gateway.com/McLVnBIlZq9kxul1okp3MjTuD_vGDj3CGB91bHTPwxA",
        "https://turbo-gateway.com/2ezX73vkHy5RQpUVbdN5keOoUaWlPBei06WxvTWHcew"
      ];

      const ACTS = [{
          t: "ACT I",
          s: 0,
          n: 15
        },
        {
          t: "ACT II",
          s: 15,
          n: 12
        },
        {
          t: "ACT III",
          s: 27,
          n: 10
        },
        {
          t: "ACT IV",
          s: 37,
          n: 20
        },
        {
          t: "ACT V",
          s: 57,
          n: 10
        }
      ];

      const FALLBACK_GATEWAYS = [
        "https://arweave.net", "https://turbo-gateway.com", "https://permagate.io",
        "https://ar-io.dev", "https://g8way.io", "https://gateway.irys.xyz"
      ];
      let activeGateways = [...FALLBACK_GATEWAYS];

      async function fetchGatewayList() {
        try {
          const r = await fetch("https://ar-io.dev/ar-io/peers", {
            signal: AbortSignal.timeout(5000)
          });
          const peers = await r.json();
          activeGateways = [...FALLBACK_GATEWAYS, ...peers.map(p => "https://" + p)];
        } catch {}
      }

      const TX_IDS = PAGES.map(u => u.split("/").pop());
      let curAct = 0,
        curPage = 0,
        isAnim = false;
      const bookClosed = document.getElementById("book-closed");
      const bookUI = document.getElementById("book-ui");
      const status = document.getElementById("status");
      const img = document.getElementById("page-img");
      const cache = {},
        inflight = {};

      function fetchPage(idx) {
        if (cache[idx] || inflight[idx] || idx >= PAGES.length) return;
        inflight[idx] = true;
        const tx = TX_IDS[idx];
        let done = false;
        activeGateways.forEach(gw => {
          const url = gw + "/" + tx;
          const i = new Image();
          i.onload = () => {
            if (!done) {
              done = true;
              cache[idx] = url;
            }
          };
          i.src = url;
        });
      }

      function prefetchAhead() {
        const base = ACTS[curAct].s + curPage;
        for (let d = 1; d <= 4; d++) fetchPage(base + d);
      }

      function setStatus(m) {
        status.setAttribute("content", m);
      }

      const ACT_COLORS = ["#f0a832", "#e8824a", "#c94d5a", "#9b2335", "#7a1535"];

      function updateTabs() {
        for (let i = 0; i < 5; i++) {
          const bg = document.getElementById("tab-bg-" + i);
          const lb = document.getElementById("tab-" + i);
          if (!bg || !lb) continue;
          const on = i === curAct;
          const h = on ? "0.18" : "0.14",
            y = on ? "0.76" : "0.74";
          bg.setAttribute("color", ACT_COLORS[i]);
          bg.setAttribute("height", h);
          bg.setAttribute("y", y);
          lb.setAttribute("color", ACT_COLORS[i]);
          lb.setAttribute("height", h);
          lb.setAttribute("y", y);
        }
      }

      function render() {
        const a = ACTS[curAct],
          idx = a.s + curPage;
        const url = cache[idx] || PAGES[idx];
        img.setAttribute("src", url);
        if (!cache[idx]) fetchPage(idx);
        updateTabs();
        setStatus(a.t + " - " + (curPage + 1) + " of " + a.n);
        setTimeout(() => setStatus(""), 4000);
        prefetchAhead();
      }

      const STEPS = 22,
        MS = 18;

      function curl(dir, onMid, onDone) {
        isAnim = true;
        let s = 0;

        function tick() {
          s++;
          const t = s / STEPS,
            e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
          img.setAttribute("ry", String((dir === 1 ? e * -170 : (1 - e) * -170).toFixed(1)));
          if (s === Math.floor(STEPS / 2)) onMid();
          if (s < STEPS) {
            setTimeout(tick, MS);
          } else {
            img.setAttribute("ry", "0");
            isAnim = false;
            onDone();
          }
        }
        tick();
      }

      function jumpToAct(i) {
        if (i >= ACTS.length || isAnim) return;
        curAct = i;
        curPage = 0;
        render();
      }

      function nextPage() {
        if (isAnim) return;
        const a = ACTS[curAct];
        let na = curAct,
          np = curPage;
        if (curPage < a.n - 1) {
          np++;
        } else if (curAct < ACTS.length - 1) {
          na++;
          np = 0;
        } else return;
        curl(1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function prevPage() {
        if (isAnim) return;
        let na = curAct,
          np = curPage;
        if (curPage > 0) {
          np--;
        } else if (curAct > 0) {
          na--;
          np = ACTS[na].n - 1;
        } else return;
        curl(-1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function openBook() {
        bookClosed.setAttribute("visible", "false");
        bookUI.setAttribute("visible", "true");
        fetchGatewayList().then(() => {
          for (let i = 0; i < PAGES.length; i++) fetchPage(i);
        });
        for (let i = 0; i < PAGES.length; i++) fetchPage(i);
        render();
      }

      function closeBook() {
        bookUI.setAttribute("visible", "false");
        bookClosed.setAttribute("visible", "true");
      }

      window.openBook = openBook;
      window.closeBook = closeBook;
      window.nextPage = nextPage;
      window.prevPage = prevPage;
      window.jumpToAct = jumpToAct;
    })();
