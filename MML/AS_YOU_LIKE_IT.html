        "https://turbo-gateway.com/YmPr6k4h7c8B-v_WNkkG3H90xXsYAGAAiwwyef5XNhE",
        "https://turbo-gateway.com/BbBQewWDgTAQKQQRWPX8EceZ5WLkPv4AqbYg4CV5Y5A",
        "https://turbo-gateway.com/e_ERjpFSqWFija5XCx7p3FrEoZaFWWZyOibazXPdcP0",
        "https://turbo-gateway.com/gGAafwHhmez1gPWmTDdll3Yibd3mdiX5oCjCUOxajZY",
        "https://turbo-gateway.com/SA1vJtozwras1Qgh-OLUTth_knjfyeBHJdscpC-YuN4",
        "https://turbo-gateway.com/_LUuVl-zOkq-NA9wKcDlEYhfqAICPWojd9oWv4uYtaE",
        "https://turbo-gateway.com/0CrFDK82wBNAzpR4NWSeNjzUloZlrjI6aLew1SnT1A0",
        "https://turbo-gateway.com/dnXsWdXyaTjJiArwViUyZlW6rtEsc_kyS-wwOC7VZGQ",
        "https://turbo-gateway.com/--0uqIakFHclc3PcFxZhVQMFcW__KNuJH3cirhIIFYs",
        "https://turbo-gateway.com/SpkP6IN8hF_Iwaq-fNXw8i5skGxjW0I1zhQp9aoxVsE",
        "https://turbo-gateway.com/1cuWJev0fELwPT3kht3-5BjOWayT-VEaT04laIYD0Fw",
        "https://turbo-gateway.com/aMFtHStKUWzU0MrqqO1Oznm2vNhqeEDVtv6A8OWv8Ls"
      ];

      const ACTS = [{
          t: "ACT I",
          s: 0,
          n: 17
        },
        {
          t: "ACT II",
          s: 17,
          n: 15
        },
        {
          t: "ACT III",
          s: 32,
          n: 20
        },
        {
          t: "ACT IV",
          s: 52,
          n: 11
        },
        {
          t: "ACT V",
          s: 63,
          n: 13
        }
      ];

      const FALLBACK_GATEWAYS = [
        "https://arweave.net", "https://turbo-gateway.com", "https://permagate.io",
        "https://ar-io.dev", "https://g8way.io", "https://gateway.irys.xyz"
      ];
      let activeGateways = [...FALLBACK_GATEWAYS];

      async function fetchGatewayList() {
        try {
          const r = await fetch("https://ar-io.dev/ar-io/peers", {
            signal: AbortSignal.timeout(5000)
          });
          const peers = await r.json();
          activeGateways = [...FALLBACK_GATEWAYS, ...peers.map(p => "https://" + p)];
        } catch {}
      }

      const TX_IDS = PAGES.map(u => u.split("/").pop());
      let curAct = 0,
        curPage = 0,
        isAnim = false;
      const bookClosed = document.getElementById("book-closed");
      const bookUI = document.getElementById("book-ui");
      const status = document.getElementById("status");
      const img = document.getElementById("page-img");
      const cache = {},
        inflight = {};

      function fetchPage(idx) {
        if (cache[idx] || inflight[idx] || idx >= PAGES.length) return;
        inflight[idx] = true;
        const tx = TX_IDS[idx];
        let done = false;
        activeGateways.forEach(gw => {
          const url = gw + "/" + tx;
          const i = new Image();
          i.onload = () => {
            if (!done) {
              done = true;
              cache[idx] = url;
            }
          };
          i.src = url;
        });
      }

      function prefetchAhead() {
        const base = ACTS[curAct].s + curPage;
        for (let d = 1; d <= 4; d++) fetchPage(base + d);
      }

      function setStatus(m) {
        status.setAttribute("content", m);
      }

      const ACT_COLORS = ["#f0a832", "#e8824a", "#c94d5a", "#9b2335", "#7a1535"];

      function updateTabs() {
        for (let i = 0; i < 5; i++) {
          const bg = document.getElementById("tab-bg-" + i);
          const lb = document.getElementById("tab-" + i);
          if (!bg || !lb) continue;
          const on = i === curAct;
          const h = on ? "0.18" : "0.14",
            y = on ? "0.76" : "0.74";
          bg.setAttribute("color", ACT_COLORS[i]);
          bg.setAttribute("height", h);
          bg.setAttribute("y", y);
          lb.setAttribute("color", ACT_COLORS[i]);
          lb.setAttribute("height", h);
          lb.setAttribute("y", y);
        }
      }

      function render() {
        const a = ACTS[curAct],
          idx = a.s + curPage;
        const url = cache[idx] || PAGES[idx];
        img.setAttribute("src", url);
        if (!cache[idx]) fetchPage(idx);
        updateTabs();
        setStatus(a.t + " - " + (curPage + 1) + " of " + a.n);
        setTimeout(() => setStatus(""), 4000);
        prefetchAhead();
      }

      const STEPS = 22,
        MS = 18;

      function curl(dir, onMid, onDone) {
        isAnim = true;
        let s = 0;

        function tick() {
          s++;
          const t = s / STEPS,
            e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
          img.setAttribute("ry", String((dir === 1 ? e * -170 : (1 - e) * -170).toFixed(1)));
          if (s === Math.floor(STEPS / 2)) onMid();
          if (s < STEPS) {
            setTimeout(tick, MS);
          } else {
            img.setAttribute("ry", "0");
            isAnim = false;
            onDone();
          }
        }
        tick();
      }

      function jumpToAct(i) {
        if (i >= ACTS.length || isAnim) return;
        curAct = i;
        curPage = 0;
        render();
      }

      function nextPage() {
        if (isAnim) return;
        const a = ACTS[curAct];
        let na = curAct,
          np = curPage;
        if (curPage < a.n - 1) {
          np++;
        } else if (curAct < ACTS.length - 1) {
          na++;
          np = 0;
        } else return;
        curl(1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function prevPage() {
        if (isAnim) return;
        let na = curAct,
          np = curPage;
        if (curPage > 0) {
          np--;
        } else if (curAct > 0) {
          na--;
          np = ACTS[na].n - 1;
        } else return;
        curl(-1, () => {
          curAct = na;
          curPage = np;
          render();
        }, () => {});
      }

      function openBook() {
        bookClosed.setAttribute("visible", "false");
        bookUI.setAttribute("visible", "true");
        fetchGatewayList().then(() => {
          for (let i = 0; i < PAGES.length; i++) fetchPage(i);
        });
        for (let i = 0; i < PAGES.length; i++) fetchPage(i);
        render();
      }

      function closeBook() {
        bookUI.setAttribute("visible", "false");
        bookClosed.setAttribute("visible", "true");
      }

      window.openBook = openBook;
      window.closeBook = closeBook;
      window.nextPage = nextPage;
      window.prevPage = prevPage;
      window.jumpToAct = jumpToAct;
    })();
